services:
  postgres:
    image: postgres:16-alpine
    container_name: products-postgres
    env_file:
      - ./server/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create.sql:/docker-entrypoint-initdb.d/create.sql

  server:
    build:
      context: ./server
    container_name: products-server
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started

  client:
    build:
      context: ./client
    container_name: products-client
    env_file:
      - ./client/.env
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
